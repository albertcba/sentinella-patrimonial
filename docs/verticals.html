<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <title>Avaluador de Vertical Puts</title>

    <style>
        body {
            background-color: #0d0d0d;
            color: #e0e0e0;
            font-family: "Segoe UI", Arial, sans-serif;
            max-width: 650px;
            margin: 40px auto;
            padding: 20px;
            line-height: 1.6;
        }

        h2, h3 {
            color: #f0f0f0;
            font-weight: 500;
        }

        label {
            font-weight: 500;
            color: #cccccc;
        }

        input {
            width: 100%;
            padding: 8px;
            margin-bottom: 14px;
            border: 1px solid #333;
            border-radius: 4px;
            background-color: #1a1a1a;
            color: #e0e0e0;
        }

        button {
            padding: 10px 20px;
            font-size: 15px;
            cursor: pointer;
            background-color: #333;
            color: #e0e0e0;
            border: 1px solid #555;
            border-radius: 4px;
        }

        button:hover {
            background-color: #444;
        }

        pre {
            background: #111;
            padding: 15px;
            border-radius: 6px;
            border: 1px solid #333;
            color: #d0d0d0;
        }

        .semafor {
            font-size: 22px;
            margin-bottom: 10px;
        }

        #advanced {
            margin-top: 15px;
        }
    </style>
</head>

<body>

    <h2>Avaluador de Vertical Puts</h2>
    <p>Calcula l’anomalia, el crèdit just i el semàfor de risc.</p>

    <form id="verticalForm">
        <label>Subjacent:</label>
        <input type="text" id="subjacent">

        <label>Preu subjacent:</label>
        <input type="number" id="preu_subjacent" step="0.01">

        <label>Expiry (YYYY-MM-DD):</label>
        <input type="text" id="expiry">

        <label>Strike curt:</label>
        <input type="number" id="strike_curt" step="0.01">

        <label>Delta curt:</label>
        <input type="number" id="delta_curt" step="0.001">

        <label>Strike llarg:</label>
        <input type="number" id="strike_llarg" step="0.01">

        <label>Delta llarg:</label>
        <input type="number" id="delta_llarg" step="0.001">

        <label>Bid:</label>
        <input type="number" id="bid" step="0.01">

        <label>Mid:</label>
        <input type="number" id="mid" step="0.01">

        <label>Ask:</label>
        <input type="number" id="ask" step="0.01">

        <button type="button" onclick="avaluar()">Avaluar</button>
    </form>

    <h3>Resultat:</h3>
    <div id="semafor" class="semafor"></div>
    <pre id="resultat"></pre>

    <button type="button" onclick="toggleAdvanced()">Mètriques avançades ▼</button>

    <div id="advanced" style="display:none;">
        <pre id="metrics"></pre>
    </div>

    <button type="button" onclick="exportarJSON()">Exportar JSON</button>
    
    <script>
        function toggleAdvanced() {
            const box = document.getElementById("advanced");
            box.style.display = (box.style.display === "none") ? "block" : "none";
        }

        function avaluar() {
            const subjacent = document.getElementById("subjacent").value;
            const preu_subjacent = parseFloat(document.getElementById("preu_subjacent").value);
            const expiry = document.getElementById("expiry").value;

            const strike_curt = parseFloat(document.getElementById("strike_curt").value);
            const delta_curt = parseFloat(document.getElementById("delta_curt").value);

            const strike_llarg = parseFloat(document.getElementById("strike_llarg").value);
            const delta_llarg = parseFloat(document.getElementById("delta_llarg").value);

            const bid = parseFloat(document.getElementById("bid").value);
            const mid = parseFloat(document.getElementById("mid").value);
            const ask = parseFloat(document.getElementById("ask").value);

            // --- CÀLCULS BASE ---
            const amplada = Math.abs(strike_curt - strike_llarg);

            const abs_dc = Math.abs(delta_curt);
            const abs_dl = Math.abs(delta_llarg);

            const p_c = abs_dl;
            const p_b = abs_dc - abs_dl;
            const p_a = 1 - abs_dc;

            const credit_just = p_c * amplada + p_b * (amplada / 2);
            const anomalia = mid - credit_just;

            let semafor = "";
            let emoji = "";
            let missatge = "";

            if (anomalia > 0.05) {
                semafor = "VERMELL";
                emoji = "🔴";
                missatge = "Crèdit desproporcionat: risc ocult.";
            } else if (anomalia < -0.05) {
                semafor = "TARONJA";
                emoji = "🟠";
                missatge = "Crèdit minso: no compensa el risc.";
            } else {
                semafor = "VERD";
                emoji = "🟢";
                missatge = "Preu normal: coherent amb el risc.";
            }

            const resultat = {
                subjacent,
                preu_subjacent,
                expiry,
                strike_curt,
                strike_llarg,
                delta_curt,
                delta_llarg,
                mid_real: mid,
                amplada,
                credit_just: credit_just.toFixed(4),
                anomalia: anomalia.toFixed(4),
                semafor,
                missatge
            };

            document.getElementById("semafor").textContent = emoji + " " + semafor;
            document.getElementById("resultat").textContent =
                JSON.stringify(resultat, null, 2);

            // --- MÈTRIQUES AVANÇADES ---
            const POP = 1 - abs_dc;
            const risk_max = amplada - mid;
            const RR = mid / risk_max;
            const EM = POP * mid - (1 - POP) * risk_max;

            document.getElementById("metrics").textContent = JSON.stringify({
                POP: POP.toFixed(4),
                RR: RR.toFixed(4),
                EM: EM.toFixed(4)
            }, null, 2);
        }

        function exportarJSON() {
            const text = document.getElementById("resultat").textContent;
            if (!text.trim()) return;
        
            const blob = new Blob([text], { type: "application/json" });
            const url = URL.createObjectURL(blob);
        
            const a = document.createElement("a");
            a.href = url;
        
            // Nom del fitxer: vertical_<subjacent>_<expiry>.json
            const subjacent = document.getElementById("subjacent").value || "vertical";
            const expiry = document.getElementById("expiry").value || "expiry";
            a.download = `vertical_${subjacent}_${expiry}.json`;
        
            a.click();
            URL.revokeObjectURL(url);
        }
       
    </script>

</body>
</html>
