name: sentinella

on:
  workflow_dispatch:
  schedule:
    - cron: "*/30 * * * *"

jobs:

  run-sentinella:
    runs-on: ubuntu-latest

    env:
      TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      FRED_API_KEY: ${{ secrets.FRED_API_KEY }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Validar actius.json
        run: |
          python - << 'EOF'
          import json, sys
          try:
            with open("actius.json") as f:
              json.load(f)
            print("✔ actius.json vàlid")
          except Exception as e:
            print("❌ ERROR: actius.json no és vàlid")
            print(e)
            sys.exit(1)
          EOF

      - name: Validar fundamentals.json
        run: |
          python - << 'EOF'
          import json, sys
          try:
            with open("fundamentals.json") as f:
              json.load(f)
            print("✔ fundamentals.json vàlid")
          except Exception as e:
            print("❌ ERROR: fundamentals.json no és vàlid")
            print(e)
            sys.exit(1)
          EOF

      - name: Validar sensibilitat_macro.json
        run: |
          python - << 'EOF'
          import json, sys
          try:
            with open("sensibilitat_macro.json") as f:
              json.load(f)
            print("✔ sensibilitat_macro.json vàlid")
          except Exception as e:
            print("❌ ERROR: sensibilitat_macro.json no és vàlid")
            print(e)
            sys.exit(1)
          EOF

      - name: Executar sentinella i generar alerta.json
        run: |
          python sentinella.py | tail -n 1 > alerta.json
          echo "JSON generat:"
          cat alerta.json

      - name: Upload alerta.json
        uses: actions/upload-artifact@v4
        with:
          name: alerta
          path: alerta.json


  update-dashboard:
    needs: run-sentinella
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Download alerta.json
        uses: actions/download-artifact@v4
        with:
          name: alerta
          path: alerta

      - name: Actualitzar dashboard
        run: cp alerta/alerta.json docs/data.json

      - name: Commit & Push
        run: |
          git config user.name "Sentinella Bot"
          git config user.email "bot@github.com"
          git add docs/data.json
          git commit -m "Actualització automàtica del dashboard" || echo "Sense canvis"
          git push
