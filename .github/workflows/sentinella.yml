name: sentinella

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  run-sentinella:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install requests
        run: pip install requests

      - name: Executar sentinella
        run: |
          python sentinella.py > alerta.json
          echo "JSON generat:"
          cat alerta.json

      - name: Upload alerta.json
        uses: actions/upload-artifact@v4
        with:
          name: alerta
          path: alerta.json
