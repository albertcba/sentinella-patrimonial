name: Full ZIP Backup

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

jobs:
  backup:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout full repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate date string
        id: date
        run: echo "DATE=$(date -u +'%Y-%m-%d')" >> $GITHUB_ENV

      - name: List repo contents (debug)
        run: |
          echo "=== ROOT CONTENTS ==="
          ls -la
          echo "=== WORKFLOWS ==="
          ls -la .github/workflows || echo "No workflows found"

      - name: Create ZIP of full repository
        run: |
          zip -r "sentinella-backup-${DATE}.zip" . \
            -x ".git/*"

      - name: Upload ZIP artifact
        uses: actions/upload-artifact@v4
        with:
          name: "sentinella-backup-${{ env.DATE }}"
          path: "sentinella-backup-${{ env.DATE }}.zip"
          retention-days: 90
