name: Backup Sentinella (Clean)

on:
  schedule:
    - cron: "0 3 1 * *"   # Cada dia 1 a les 03:00 UTC
  workflow_dispatch:

jobs:
  backup:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout public repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Prepare clean backup
        run: |
          rm -rf .git
          zip -r sentinella_backup.zip .

      - name: Clone private backup repo
        run: |
          git clone https://albertcba:${{ secrets.BACKUP_TOKEN }}@github.com/albertcba/sentinella-patrimonial.git backup_repo
