name: Full Mirror Backup

on:
  schedule:
    - cron: "0 3 * * *"   # cada dia a les 03:00 UTC
  workflow_dispatch:

jobs:
  backup:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source repo (sentinella-patrimonial)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Clone private backup repo
        env:
          TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git clone https://albertcba:${TOKEN}@github.com/albertcba/sentinella-backup.git backup

      - name: Sync all files (full mirror)
        run: |
          rsync -av --delete --exclude ".git/" ./ backup/

      - name: Commit & push
        run: |
          cd backup
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add .
          git commit -m "Backup $(date -u +"%Y-%m-%dT%H:%M:%SZ")" || echo "No changes"
          git push
