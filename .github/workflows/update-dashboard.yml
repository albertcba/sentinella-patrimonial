name: Actualitzar Dashboard

on:
  workflow_run:
    workflows:
      - sentinella
    types:
      - completed

jobs:
  update-dashboard:
    runs-on: ubuntu-latest

    steps:

      - name: Esperar 10 segons perquè els artifacts estiguin disponibles
        run: sleep 10      

      - name: Esperar fins que l'artifact estigui disponible
        run: |
          for i in {1..10}; do
            echo "Intent $i de descarregar artifact..."
            if gh run download ${{ github.event.workflow_run.id }} --name alerta --dir alerta 2>/dev/null; then
              echo "Artifact descarregat!"
              exit 0
            fi
            echo "No disponible encara. Esperant 3 segons..."
            sleep 3
          done
          echo "ERROR: No s'ha pogut descarregar l'artifact després de 10 intents."
          exit 1
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Checkout dashboard repo
        uses: actions/checkout@v4
        with:
          repository: albertcba/sentinella-dashboard
          token: ${{ secrets.DASHBOARD_TOKEN }}
          path: dashboard

      - name: Copiar JSON al dashboard
        run: cp alerta/alerta.json dashboard/docs/data.json

      - name: Commit & Push
        run: |
          cd dashboard
          git config user.name "Sentinella Bot"
          git config user.email "bot@github.com"
          git add docs/data.json
          git commit -m "Actualització automàtica del dashboard" || echo "Sense canvis"
          git push
